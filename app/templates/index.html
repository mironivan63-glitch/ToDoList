<!DOCTYPE html>
<html>
<head>
    <title>DevOps TODO App</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .todo { margin: 10px 0; padding: 10px; background: #f0f0f0; display: flex; justify-content: space-between; }
        .completed { text-decoration: line-through; color: gray; }
        input[type="text"] { padding: 10px; width: 70%; }
        button { padding: 10px; margin: 5px; }
        .metrics { margin-top: 20px; font-size: 12px; color: gray; }
    </style>
</head>
<body>
    <h1>📝 DevOps Home Project - TODO List</h1>
    
    <div>
        <input type="text" id="todoInput" placeholder="Enter a new task...">
        <button onclick="addTodo()">Add</button>
    </div>
    
    <div id="todosList"></div>
    
    <div class="metrics" id="metrics"></div>

    <script>
        async function loadTodos() {
            const response = await fetch('/api/todos');
            const todos = await response.json();
            
            const todosList = document.getElementById('todosList');
            todosList.innerHTML = '';
            
            todos.forEach(todo => {
                const div = document.createElement('div');
                div.className = 'todo';
                div.innerHTML = `
                    <span class="${todo.completed ? 'completed' : ''}">${todo.title}</span>
                    <div>
                        <button onclick="toggleTodo(${todo.id}, ${!todo.completed})">
                            ${todo.completed ? '↺' : '✓'}
                        </button>
                        <button onclick="deleteTodo(${todo.id})">🗑</button>
                    </div>
                `;
                todosList.appendChild(div);
            });
            
            await loadMetrics();
        }
        
        async function loadMetrics() {
            const response = await fetch('/metrics');
            const metrics = await response.json();
            document.getElementById('metrics').innerHTML = `
                📊 Total requests: ${metrics.requests_total} | 
                📝 Total todos: ${metrics.todos_count}
            `;
        }
        
        async function addTodo() {
            const input = document.getElementById('todoInput');
            const title = input.value.trim();
            if (!title) return;
            
            await fetch('/api/todos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title: title})
            });
            
            input.value = '';
            loadTodos();
        }
        
        async function toggleTodo(id, completed) {
            await fetch(`/api/todos/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({completed: completed})
            });
            loadTodos();
        }
        
        async function deleteTodo(id) {
            await fetch(`/api/todos/${id}`, {method: 'DELETE'});
            loadTodos();
        }
        
        loadTodos();
        setInterval(loadMetrics, 5000);
    </script>
</body>
</html>
